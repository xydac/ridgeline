name: release snapshot

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    name: goreleaser snapshot build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Run goreleaser-cross in snapshot mode
        run: |
          docker run --rm \
            -e CGO_ENABLED=1 \
            -v "$PWD":/go/src/${{ github.repository }} \
            -w /go/src/${{ github.repository }} \
            ghcr.io/goreleaser/goreleaser-cross:v1.26 \
            release --clean --snapshot --skip=publish,sign

      - name: List built artifacts
        run: ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: ridgeline-snapshot
          path: dist/ridgeline_*.tar.gz
          if-no-files-found: error
          retention-days: 7
